spring.application.name=clientes-service
#spring.datasource.url=jdbc:postgresql://localhost:5432/banco
spring.datasource.url=jdbc:postgresql://banco-db:5432/banco
spring.datasource.username=postgres
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=servicio-clientes
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#spring.rabbitmq.host=banco-rabbitmq
spring.rabbitmq.host=banco-rabbit
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest