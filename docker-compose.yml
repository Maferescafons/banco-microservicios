version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: banco-db
    environment:
      POSTGRES_DB: banco
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: banco-rabbit
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  cliente-service:
    build: ./clientes-service
    container_name: cliente-service
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - rabbitmq

  cuenta-service:
    build: ./cuenta-service
    container_name: cuenta-service
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - rabbitmq
      - cliente-service